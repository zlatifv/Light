services:
  - type: web
    name: light-web-pwa
    runtime: static
    buildCommand: cd web && npm install && npm run build
    staticPublishPath: ./web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /manifest.json
        name: Cache-Control
        value: public, max-age=86400
    envVars:
      - key: VITE_WS_URL
        value: wss://light-backend.onrender.com/ws
      - key: VITE_API_URL
        value: https://light-backend.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_GITHUB_CLIENT_ID
        sync: false
      - key: VITE_DISCORD_CLIENT_ID
        sync: false

  - type: web
    name: light-backend
    runtime: node
    plan: free
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm run db:deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEB_ORIGIN
        value: https://light-web-pwa.onrender.com
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: light-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Set these manually in the Render dashboard — never commit real
      # OAuth secrets to render.yaml, even though it's not public, to keep
      # the habit consistent with everything else in this repo.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false

databases:
  - name: light-postgres
    plan: free
    databaseName: light
    user: light_admin
